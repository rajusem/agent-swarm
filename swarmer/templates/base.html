<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Swarmer{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <script src="/static/htmx.min.js"></script>
  <style>
    body { min-height: 100vh; }
    .nav-link.active { font-weight: 600; }
    .phase-idle      { color: var(--bs-secondary); }
    .phase-pending   { color: var(--bs-warning); }
    .phase-running   { color: var(--bs-success); }
    .phase-succeeded { color: var(--bs-primary); }
    .phase-failed    { color: var(--bs-danger); }
    .phase-stopped   { color: var(--bs-secondary); }
    pre.last-output  { font-size: .8rem; }
    .namespace-badge { font-family: monospace; font-size: .85em; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/workspaces">🐝 Agent Swarm</a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
<form method="post" action="/logout" class="d-flex">
        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">

  {% with messages = request.session.pop('flash_messages', []) %}
    {% for msg in messages %}
    <div class="alert alert-{{ msg.type }} alert-dismissible fade show" role="alert">
      {{ msg.text }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSmLUmjhC8cQ6w6Aiu4Cq9yNPdj"
        crossorigin="anonymous"></script>
{% block scripts %}{% endblock %}
</body>
</html>
