<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarmer — Login</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    html, body { height: 100%; }
    .login-card { max-width: 440px; width: 100%; }
    textarea.token-field { font-family: monospace; font-size: .8rem; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="login-card p-4 rounded border bg-body-tertiary">
  <div class="text-center mb-4">
    <h2 class="fw-bold">&#x26A1; Swarmer</h2>
    <p class="text-muted small">Agent coordinator dashboard</p>
  </div>

  {% with messages = request.session.pop('flash_messages', []) %}
    {% for msg in messages %}
    <div class="alert alert-{{ msg.type }} py-2 small" role="alert">{{ msg.text }}</div>
    {% endfor %}
  {% endwith %}

  {% if openshift_auth_url %}
  <div class="d-grid mb-3">
    <a href="{{ openshift_auth_url }}" class="btn btn-danger">Sign in with OpenShift</a>
  </div>
  <div class="d-flex align-items-center mb-3">
    <hr class="flex-grow-1">
    <span class="px-2 text-muted small">or paste a token</span>
    <hr class="flex-grow-1">
  </div>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label for="token" class="form-label">Bearer Token</label>
      <textarea id="token" name="token" rows="5" required
                class="form-control token-field"
                placeholder="Paste your K8s bearer token here"
                autofocus></textarea>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Sign in</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSmLUmjhC8cQ6w6Aiu4Cq9yNPdj"
        crossorigin="anonymous"></script>
</body>
</html>
