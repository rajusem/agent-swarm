<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarmer — Login</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    html, body { height: 100%; }
    .login-card { max-width: 380px; width: 100%; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="login-card p-4 rounded border bg-body-tertiary">
  <div class="text-center mb-4">
    <h2 class="fw-bold">⚡ Swarmer</h2>
    <p class="text-muted small">Agent coordinator dashboard</p>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 small" role="alert">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" name="password"
             autocomplete="current-password" autofocus required>
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-primary">Sign in</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSmLUmjhC8cQ6w6Aiu4Cq9yNPdj"
        crossorigin="anonymous"></script>
</body>
</html>
