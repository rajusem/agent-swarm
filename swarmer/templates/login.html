<!doctype html>
<html lang="en" class="pf-v6-theme-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarmer — Login</title>
  <link rel="stylesheet"
        href="https://unpkg.com/@patternfly/patternfly@6/patternfly.min.css">
  <link rel="stylesheet"
        href="https://unpkg.com/@patternfly/patternfly@6/patternfly-addons.css">
  <style>
    html, body { height: 100%; }
    .login-card { max-width: 440px; width: 100%; }
    textarea.token-field { font-family: var(--pf-t--global--font--family--mono); font-size: var(--pf-t--global--font--size--xs); }
  </style>
</head>
<body style="display:flex; align-items:center; justify-content:center;">

<div class="pf-v6-c-card login-card">
  <div class="pf-v6-c-card__body" style="text-align:center; padding-bottom:0;">
    <h2 class="pf-v6-c-title pf-m-xl" style="margin-bottom:var(--pf-t--global--spacer--xs);">&#x26A1; Swarmer</h2>
    <p style="color:var(--pf-t--global--text--color--subtle); font-size:var(--pf-t--global--font--size--sm); margin:0 0 var(--pf-t--global--spacer--md) 0;">Agent coordinator dashboard</p>
  </div>
  <div class="pf-v6-c-card__body">

    {% with messages = request.session.pop('flash_messages', []) %}
      {% for msg in messages %}
      <div class="pf-v6-c-alert pf-m-{{ 'danger' if msg.type == 'danger' else msg.type }} pf-m-inline pf-m-plain" style="margin-bottom:var(--pf-t--global--spacer--sm);" role="alert">
        <p class="pf-v6-c-alert__title">{{ msg.text }}</p>
      </div>
      {% endfor %}
    {% endwith %}

    {% if openshift_auth_url %}
    <div style="margin-bottom:var(--pf-t--global--spacer--md);">
      <a href="{{ openshift_auth_url }}" class="pf-v6-c-button pf-m-danger pf-m-block">Sign in with OpenShift</a>
    </div>
    <div style="display:flex; align-items:center; margin-bottom:var(--pf-t--global--spacer--md);">
      <hr style="flex:1;">
      <span style="padding:0 var(--pf-t--global--spacer--sm); color:var(--pf-t--global--text--color--subtle); font-size:var(--pf-t--global--font--size--sm);">or paste a token</span>
      <hr style="flex:1;">
    </div>
    {% endif %}

    <form method="post" action="/login" class="pf-v6-c-form">
      <div class="pf-v6-c-form__group">
        <label class="pf-v6-c-form__label" for="token">
          <span class="pf-v6-c-form__label-text">Bearer Token</span>
        </label>
        <div class="pf-v6-c-form__group-control">
          <textarea id="token" name="token" rows="5" required
                    class="pf-v6-c-form-control token-field"
                    placeholder="Paste your K8s bearer token here"
                    autofocus></textarea>
        </div>
      </div>
      <div class="pf-v6-c-form__group pf-m-action">
        <div class="pf-v6-c-form__actions">
          <button type="submit" class="pf-v6-c-button pf-m-primary pf-m-block">Sign in</button>
        </div>
      </div>
    </form>

  </div>
</div>

</body>
</html>
