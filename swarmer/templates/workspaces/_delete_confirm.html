<div class="pf-v6-c-card" style="border-color:var(--pf-t--global--color--status--danger--default); padding:var(--pf-t--global--spacer--md);">
  <div class="pf-v6-c-card__body">
    <p style="font-weight:var(--pf-t--global--font--weight--heading--bold); color:var(--pf-t--global--color--status--danger--default); margin-bottom:var(--pf-t--global--spacer--sm);">⚠ Delete workspace?</p>
    <p style="font-size:var(--pf-t--global--font--size--sm); color:var(--pf-t--global--text--color--subtle); margin-bottom:var(--pf-t--global--spacer--sm);">
      This will permanently delete workspace <strong>{{ ws.display_name }}</strong>,
      all its secrets, sessions, and the Kubernetes namespace
      <code>{{ ws.namespace }}</code>.
    </p>
    <p style="font-size:var(--pf-t--global--font--size--sm); margin-bottom:var(--pf-t--global--spacer--sm);">Type <strong>{{ ws.display_name }}</strong> to confirm:</p>

    {% if error %}
    <div class="pf-v6-c-alert pf-m-danger pf-m-inline pf-m-plain" style="margin-bottom:var(--pf-t--global--spacer--sm);" role="alert">
      <p class="pf-v6-c-alert__title">{{ error }}</p>
    </div>
    {% endif %}

    <form method="post" action="/workspaces/{{ ws.id }}/delete">
      <div style="display:flex; gap:var(--pf-t--global--spacer--sm);">
        <input type="text" class="pf-v6-c-form-control" name="confirm_name"
               placeholder="{{ ws.display_name }}" autofocus style="flex:1;">
        <button type="submit" class="pf-v6-c-button pf-m-danger pf-m-small">Delete</button>
        <button type="button" class="pf-v6-c-button pf-m-secondary pf-m-small"
                onclick="this.closest('form').parentElement.parentElement.parentElement.outerHTML = '<span id=\'delete-btn-{{ ws.id }}\'><button class=\'pf-v6-c-button pf-m-danger pf-m-small\' hx-get=\'/workspaces/{{ ws.id }}/delete\' hx-target=\'#delete-btn-{{ ws.id }}\' hx-swap=\'outerHTML\'>Delete Workspace</button></span>'; htmx.process(document.getElementById('delete-btn-{{ ws.id }}'))">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
