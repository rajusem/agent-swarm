<div class="border border-danger rounded p-3 bg-body-tertiary">
  <p class="fw-semibold text-danger mb-2">⚠ Delete workspace?</p>
  <p class="small text-muted mb-2">
    This will permanently delete workspace <strong>{{ ws.display_name }}</strong>,
    all its secrets, sessions, and the Kubernetes namespace
    <code>{{ ws.namespace }}</code>.
  </p>
  <p class="small mb-2">Type <strong>{{ ws.display_name }}</strong> to confirm:</p>

  {% if error %}
  <div class="alert alert-danger py-1 small mb-2">{{ error }}</div>
  {% endif %}

  <form method="post" action="/workspaces/{{ ws.id }}/delete">
    <div class="input-group input-group-sm">
      <input type="text" class="form-control" name="confirm_name"
             placeholder="{{ ws.display_name }}" autofocus>
      <button type="submit" class="btn btn-danger">Delete</button>
      <button type="button" class="btn btn-outline-secondary"
              onclick="this.closest('form').parentElement.outerHTML = '<span id=\'delete-btn-{{ ws.id }}\'><button class=\'btn btn-sm btn-danger\' hx-get=\'/workspaces/{{ ws.id }}/delete\' hx-target=\'#delete-btn-{{ ws.id }}\' hx-swap=\'outerHTML\'>Delete Workspace</button></span>'; htmx.process(document.getElementById('delete-btn-{{ ws.id }}'))">
        Cancel
      </button>
    </div>
  </form>
</div>
