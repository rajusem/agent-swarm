{# Stable shell — rendered once at page load. #}
{# repo_add / repo_delete return HX-Trigger: repoListChanged, which causes #}
{# this div to fetch fresh inner content from the /repos/items endpoint.   #}
<div id="repo-list"
     hx-get="/workspaces/{{ ws_id }}/sessions/{{ session.id }}/repos/items"
     hx-trigger="repoListChanged from:body"
     hx-swap="innerHTML"
     hx-indicator="#repo-list-spinner">
  {% include "sessions/_repo_items.html" with context %}
</div>
<span id="repo-list-spinner" class="htmx-indicator repo-bounce-dots"
      aria-label="Loading" style="display:inline-flex; gap:3px; vertical-align:middle; margin-top:var(--pf-t--global--spacer--xs);">
  <span class="rbd-dot"></span><span class="rbd-dot"></span><span class="rbd-dot"></span>
</span>
