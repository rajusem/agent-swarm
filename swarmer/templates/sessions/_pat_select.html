<div style="display:flex; align-items:center; gap:var(--pf-t--global--spacer--xs);">
  <label style="font-size:var(--pf-t--global--font--size--sm); color:var(--pf-t--global--text--color--subtle); white-space:nowrap;">GitHub PAT</label>
  <select class="pf-v6-c-form-control"
        style="width:auto; font-size:var(--pf-t--global--font--size--sm);"
        onchange="document.getElementById('cfg_pat').value=this.value; window._cfgSave && window._cfgSave()"
        {% if session.is_active %}disabled{% endif %}>
  <option value="">— No PAT —</option>
  {% for pat in pats %}
  <option value="{{ pat.id }}"
          {{ 'selected' if session.github_pat and session.github_pat.id == pat.id }}>
    {{ pat.name }}
  </option>
  {% endfor %}
  </select>
</div>
