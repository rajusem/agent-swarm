<!doctype html>
<html lang="en" class="pf-v6-theme-dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarmer — Completing sign-in</title>
  <link rel="stylesheet"
        href="https://unpkg.com/@patternfly/patternfly@6/patternfly.min.css">
  <style>
    html, body { height: 100%; }
  </style>
</head>
<body style="display:flex; align-items:center; justify-content:center;">

<div class="pf-v6-c-card" style="max-width:440px; width:100%; text-align:center;">
  <div class="pf-v6-c-card__body">
    <p id="status" style="color:var(--pf-t--global--text--color--subtle); margin:0;">Completing sign-in...</p>
  </div>
</div>

<script>
(function() {
  var params = new URLSearchParams(window.location.hash.slice(1));
  var token = params.get('access_token') || '';
  var state = params.get('state') || '';
  if (!token) {
    document.getElementById('status').textContent = 'No token found in redirect URL.';
    return;
  }
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = '/auth/callback';
  var tokenInput = document.createElement('input');
  tokenInput.type = 'hidden';
  tokenInput.name = 'token';
  tokenInput.value = token;
  form.appendChild(tokenInput);
  var stateInput = document.createElement('input');
  stateInput.type = 'hidden';
  stateInput.name = 'state';
  stateInput.value = state;
  form.appendChild(stateInput);
  document.body.appendChild(form);
  form.submit();
})();
</script>

</body>
</html>
