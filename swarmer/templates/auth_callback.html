<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarmer — Completing sign-in</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    html, body { height: 100%; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="p-4 rounded border bg-body-tertiary text-center" style="max-width: 440px; width: 100%;">
  <p id="status" class="text-muted mb-0">Completing sign-in...</p>
</div>

<script>
(function() {
  var hash = window.location.hash.substring(1);
  var params = {};
  hash.split('&').forEach(function(pair) {
    var parts = pair.split('=');
    params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || '');
  });
  var token = params['access_token'];
  if (!token) {
    document.getElementById('status').textContent = 'No token found in redirect URL.';
    return;
  }
  var form = document.createElement('form');
  form.method = 'POST';
  form.action = '/auth/callback';
  var input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'token';
  input.value = token;
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
})();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSmLUmjhC8cQ6w6Aiu4Cq9yNPdj"
        crossorigin="anonymous"></script>
</body>
</html>
