kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: swarmer
nodes:
  - role: control-plane
    # Map the NodePort 30080 → localhost:8080 so the dashboard is reachable
    # at http://localhost:8080 after `make kind-deploy`
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
