apiVersion: v1
kind: Service
metadata:
  name: swarmer
  namespace: swarmer
spec:
  type: NodePort
  selector:
    app: swarmer
  ports:
    - port: 8080
      targetPort: 8080
      # Fixed nodePort so kind extraPortMappings and the Makefile port-forward
      # both use a predictable address.
      nodePort: 30080
      name: http
