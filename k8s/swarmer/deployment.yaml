apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarmer
  namespace: swarmer
  labels:
    app: swarmer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swarmer
  # Only one replica safe with SQLite — no concurrent writers
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: swarmer
    spec:
      serviceAccountName: swarmer

      containers:
        - name: swarmer
          # SWARMER_IMAGE is replaced by the deploy Makefile target
          image: SWARMER_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http

          env:
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: DATABASE_URL
              value: sqlite+aiosqlite:////data/swarmer.db
            - name: SWARMER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: swarmer-secret
                  key: SWARMER_SECRET_KEY
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            - name: OPENSHIFT_OAUTH_URL
              value: "OPENSHIFT_OAUTH_URL_VALUE"
            - name: REDIRECT_BASE_URL
              value: "REDIRECT_BASE_URL_VALUE"
            - name: AGENT_IMAGE_OPENCODE
              value: "AGENT_IMAGE_OPENCODE_VALUE"
            - name: AGENT_IMAGE_CRUSH
              value: "AGENT_IMAGE_CRUSH_VALUE"
            - name: MAX_CONCURRENT_AGENTS
              value: "MAX_CONCURRENT_AGENTS_VALUE"

          volumeMounts:
            - name: swarmer-data
              mountPath: /data

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: swarmer-data
          persistentVolumeClaim:
            claimName: swarmer-data
