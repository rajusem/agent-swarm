apiVersion: apps/v1
kind: Deployment
metadata:
  name: swarmer
  namespace: swarmer
  labels:
    app: swarmer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swarmer
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: swarmer
    spec:
      serviceAccountName: swarmer

      containers:
        - name: swarmer
          image: quay.io/jpacker/swarmer:0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http

          env:
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: DATABASE_URL
              value: sqlite+aiosqlite:////data/swarmer.db
            - name: SWARMER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: swarmer-secret
                  key: SWARMER_SECRET_KEY
            - name: K8S_API_URL
              value: "https://kubernetes.default.svc"
            - name: OPENSHIFT_OAUTH_URL
              value: "OPENSHIFT_OAUTH_URL_VALUE"
            - name: AGENT_IMAGE_OPENCODE
              value: "quay.io/jpacker/opencode-golang:0.2"
            - name: AGENT_IMAGE_PYTHON
              value: "quay.io/jpacker/opencode-python:0.2"
            - name: AGENT_IMAGE_CRUSH
              value: "ghcr.io/gurnben/crush-container:latest"
            - name: DEFAULT_AGENT_TOOL
              value: "opencode-golang"

          volumeMounts:
            - name: swarmer-data
              mountPath: /data

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: swarmer-data
          persistentVolumeClaim:
            claimName: swarmer-data
