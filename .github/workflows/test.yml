name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # pytest, pytest-asyncio, and httpx are used by the test suite but not
      # declared in requirements.txt (which lists production deps only).
      - run: pip install pytest==8.4.1 pytest-asyncio==1.3.0 httpx==0.28.1 respx==0.23.1

      - run: make test
