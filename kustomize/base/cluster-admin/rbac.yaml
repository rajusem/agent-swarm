---
# ClusterRole: swarmer must manage resources across ALL workspace namespaces,
# not just its own — it creates namespaces, secrets, PVCs, pods and services
# on behalf of the user.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: swarmer
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "pods/portforward"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings"]
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: swarmer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: swarmer
subjects:
  - kind: ServiceAccount
    name: swarmer
    namespace: swarmer
---
# Minimal ClusterRole for swarmer dashboard users.
# Bind via RoleBinding in workspace namespaces to grant user visibility.
# Only namespaced rules apply: pods get/list in that namespace.
# Use: make grant-workspace SA_USER=<name> WORKSPACE_NS=<namespace>
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: swarmer-user
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
